<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Strategy Hub | Mr. Nawras</title>
    <style>
        :root {
            --black: #0a0a0a;
            --gold: #d4af37;
            --deep-blue: #0a1931;
            --text: #ffffff;
        }
        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--black);
        }
        /* Top Navigation Bar */
        nav {
            height: 60px;
            background: linear-gradient(to right, var(--deep-blue), var(--black));
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 2px solid var(--gold);
            z-index: 1000;
            position: relative;
        }
        .nav-btn {
            background: none;
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: var(--text);
            padding: 8px 20px;
            margin: 0 10px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .nav-btn:hover, .nav-btn.active {
            background: var(--gold);
            color: #000;
            border-color: var(--gold);
        }
        /* Report Viewer Window */
        #view-container {
            width: 100%;
            height: calc(100vh - 60px);
            border: none;
        }
    </style>
</head>
<body>

<nav>
    <button class="nav-btn active" onclick="loadReport('seo_report.html', this)">1. SEO Audit</button>
    <button class="nav-btn" onclick="loadReport('competitor_gap.html', this)">2. Competitor Gap</button>
</nav>

<iframe id="view-container" src="seo_report.html"></iframe>

<script>
    function loadReport(url, btn) {
        // Change the iframe source
        document.getElementById('view-container').src = url;
        
        // Update active button styling
        const btns = document.querySelectorAll('.nav-btn');
        btns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
</script>

</body>
</html>
