<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Executive Strategy Hub | Mr. Nawras</title>
    <style>
        :root {
            --black: #0a0a0a;
            --gold: #d4af37;
            --deep-blue: #0a1931;
            --text: #ffffff;
        }
        /* Prevent the main window from scrolling to avoid 'double scrollbars' */
        body, html {
            margin: 0; padding: 0; 
            height: 100%; width: 100%;
            overflow: hidden; 
            background: var(--black);
            font-family: -apple-system, system-ui, sans-serif;
        }
        
        /* Dashboard Layout */
        .dashboard {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        nav {
            height: 70px;
            min-height: 70px;
            background: linear-gradient(to right, var(--deep-blue), var(--black));
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            border-bottom: 2px solid var(--gold);
            box-sizing: border-box;
            z-index: 10;
        }

        .nav-group { display: flex; gap: 8px; }

        .nav-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: var(--text);
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 6px;
            font-size: 11px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .nav-btn.active {
            background: var(--gold);
            color: #000;
            border-color: var(--gold);
            font-weight: bold;
        }

        .pdf-btn {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
            padding: 8px 12px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* The Scrollable Area */
        #content-area {
            flex-grow: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch; /* Smooth momentum scroll for iOS */
            background: var(--black);
        }

        #view-container {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Landscape Adjustments */
        @media (orientation: landscape) and (max-height: 500px) {
            nav { height: 50px; min-height: 50px; }
            #content-area { height: calc(100vh - 50px); }
        }
    </style>
</head>
<body>

<div class="dashboard">
    <nav>
        <div class="nav-group">
            <button class="nav-btn active" onclick="loadReport('./seo_report.html', this)">1. SEO Audit</button>
            <button class="nav-btn" onclick="loadReport('./competitor_gap.html', this)">2. Competitor Gap</button>
        </div>
        <button class="pdf-btn" onclick="downloadPDF()">PDF</button>
    </nav>

    <div id="content-area">
        <iframe id="view-container" src="./seo_report.html"></iframe>
    </div>
</div>

<script>
    function loadReport(url, btn) {
        document.getElementById('view-container').src = url;
        const btns = document.querySelectorAll('.nav-btn');
        btns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function downloadPDF() {
        const reportFrame = document.getElementById('view-container').contentWindow;
        reportFrame.focus();
        reportFrame.print();
    }
</script>

</body>
</html>
