<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Strategy Hub | Mr. Nawras</title>
    <style>
        :root {
            --black: #0a0a0a;
            --gold: #d4af37;
            --deep-blue: #0a1931;
            --text: #ffffff;
        }
        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--black);
        }
        /* Top Navigation Bar */
        nav {
            height: 70px;
            background: linear-gradient(to right, var(--deep-blue), var(--black));
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 2px solid var(--gold);
            z-index: 1000;
            position: relative;
        }
        .nav-group { display: flex; gap: 10px; }
        .nav-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: var(--text);
            padding: 10px 18px;
            cursor: pointer;
            border-radius: 6px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .nav-btn.active {
            background: var(--gold);
            color: #000;
            border-color: var(--gold);
            font-weight: bold;
        }
        .pdf-btn {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 50px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }
        /* Report Viewer Window */
        #view-container {
            width: 100%;
            height: calc(100vh - 72px);
            border: none;
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-group">
        <button class="nav-btn active" onclick="loadReport('./seo_report.html', this)">1. SEO Audit</button>
        <button class="nav-btn" onclick="loadReport('./competitor_gap.html', this)">2. Competitor Gap</button>
    </div>
    <button class="pdf-btn" onclick="downloadPDF()">Download PDF</button>
</nav>

<iframe id="view-container" src="./seo_report.html"></iframe>

<script>
    function loadReport(url, btn) {
        document.getElementById('view-container').src = url;
        const btns = document.querySelectorAll('.nav-btn');
        btns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function downloadPDF() {
        const reportFrame = document.getElementById('view-container').contentWindow;
        reportFrame.focus();
        reportFrame.print();
    }
</script>

</body>
</html>
