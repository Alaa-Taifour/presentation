<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SEO Strategy Dashboard | Golden Corn Export USA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Professional SEO Dashboard for Golden Corn Export USA & Axion Divisions">
  <link rel="stylesheet" href="styles.css">
  <style>
    .window {
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
      transition: all 0.3s ease;
    }
    .window:hover {
      transform: translateY(-4px);
      box-shadow: 0 35px 60px -15px rgb(0 0 0 / 0.5);
    }
  </style>
</head>
<body>

  <div class="dashboard-shell">
    <!-- Header -->
    <header class="dashboard-header">
      <div class="header-content">
        <h1>Golden Corn Export USA</h1>
        <p class="subtitle">SEO Strategy Dashboard • Axion Divisions • March 2026</p>
      </div>
      
      <div class="kpi-section">
        <p class="goal">🎯 Goal: 50–100 qualified B2B quotes/month in 6–9 months</p>
        
        <div class="chart-block">
          <div class="chart-bars">
            <div class="chart-bar">
              <span class="chart-label">NOW</span>
              <div class="chart-bar-fill chart-bar-now"></div>
              <span class="chart-value">\~800</span>
            </div>
            <div class="chart-bar">
              <span class="chart-label">MONTH 6</span>
              <div class="chart-bar-fill chart-bar-mid"></div>
              <span class="chart-value">12K</span>
            </div>
            <div class="chart-bar">
              <span class="chart-label">MONTH 12</span>
              <div class="chart-bar-fill chart-bar-high"></div>
              <span class="chart-value">28K+</span>
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- Two Professional Windows -->
    <main class="dashboard-main">
      <!-- LEFT WINDOW: SEO Report -->
      <section class="panel window">
        <header class="panel-header">
          <h2>📊 SEO Analytics &amp; Optimization Report</h2>
          <span>seo_report.html</span>
        </header>
        <div class="panel-body">
          <iframe src="seo_report.html" class="panel-iframe" title="SEO Report"></iframe>
        </div>
      </section>

      <!-- RIGHT WINDOW: Competitor Gap & Roadmap -->
      <section class="panel window">
        <header class="panel-header">
          <h2>📋 Competitor Gap &amp; 90-Day Roadmap</h2>
          <span>competitor_gap.html</span>
        </header>
        <div class="panel-body">
          <iframe src="competitor_gap.html" class="panel-iframe" title="Competitor Gap Analysis"></iframe>
        </div>
      </section>
    </main>
  </div>

</body>
</html>
