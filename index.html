<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Executive Strategy Hub | Mr. Nawras</title>
    <style>
        :root {
            --black: #0a0a0a;
            --gold: #d4af37;
            --deep-blue: #0a1931;
            --text: #ffffff;
        }
        /* Lock the body to prevent double scrollbars */
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--black);
        }
        
        nav {
            height: 70px;
            background: linear-gradient(to right, var(--deep-blue), var(--black));
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 2px solid var(--gold);
            z-index: 1000;
            position: relative;
            box-sizing: border-box;
        }

        .nav-group { display: flex; gap: 8px; }

        .nav-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: var(--text);
            padding: 10px 14px;
            cursor: pointer;
            border-radius: 6px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .nav-btn.active {
            background: var(--gold);
            color: #000;
            border-color: var(--gold);
            font-weight: bold;
        }

        .pdf-btn {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 50px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Container for the iframe with smooth mobile scrolling */
        #frame-wrapper {
            width: 100%;
            height: calc(100vh - 70px);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch; /* Essential for iPhone/iPad */
        }

        #view-container {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        @media print {
            nav { display: none; }
            #frame-wrapper { height: auto; overflow: visible; }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-group">
        <button class="nav-btn active" onclick="loadReport('./seo_report.html', this)">1. SEO Audit</button>
        <button class="nav-btn" onclick="loadReport('./competitor_gap.html', this)">2. Competitor Gap</button>
    </div>
    <button class="pdf-btn" onclick="downloadPDF()">PDF</button>
</nav>

<div id="frame-wrapper">
    <iframe id="view-container" src="./seo_report.html" scrolling="yes"></iframe>
</div>

<script>
    function loadReport(url, btn) {
        document.getElementById('view-container').src = url;
        const btns = document.querySelectorAll('.nav-btn');
        btns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function downloadPDF() {
        const reportFrame = document.getElementById('view-container').contentWindow;
        reportFrame.focus();
        reportFrame.print();
    }
</script>

</body>
</html>
