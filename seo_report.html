<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background: #050505; color: #fff;
            font-family: -apple-system, sans-serif;
            margin: 0; padding: 20px; line-height: 1.6;
        }
        .container { max-width: 600px; margin: 0 auto; }
        
        /* Glass Card Style */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            backdrop-filter: blur(5px);
        }
        
        h2 {
            font-size: 13px; text-transform: uppercase;
            letter-spacing: 2px; color: #d4af37;
            margin-bottom: 15px; border-bottom: 1px solid rgba(212, 175, 55, 0.1);
            padding-bottom: 10px;
        }

        /* Modern Data Rows */
        .data-row {
            display: flex; justify-content: space-between;
            padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .label { color: rgba(255,255,255,0.5); font-size: 12px; }
        .value { font-weight: 500; font-size: 13px; color: #fff; }
        .status-dot {
            height: 8px; width: 8px; border-radius: 50%;
            display: inline-block; margin-right: 5px;
        }

        /* Table Styling */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; font-size: 10px; color: rgba(255,255,255,0.3); text-transform: uppercase; padding-bottom: 10px; }
        td { padding: 12px 0; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        @media print { body { background: white; color: black; } .glass-card { border: 1px solid #eee; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="glass-card">
            <h2>Asset Performance</h2>
            <div class="data-row">
                <span class="label">Axion Automobile</span>
                <span class="value"><span class="status-dot" style="background:#e74c3c"></span> Staging Index Risk</span>
            </div>
            <div class="data-row">
                <span class="label">Golden Corn Export</span>
                <span class="value"><span class="status-dot" style="background:#2ecc71"></span> Active Optimization</span>
            </div>
        </div>
    </div>
</body>
</html>
